# Nafetha API + admin UI behind Nginx Proxy Manager (80/443/81) on a VPS.
#
# Faster rebuilds (Docker Compose v2 uses BuildKit by default):
#   • Cache mounts: pip, npm, Vite; Playwright Chromium downloads reuse /root/.cache/pw-playwright then copy into the image.
#   • Only layers after changed files rerun: keep edits in app/ vs requirements.txt in mind.
#   • Avoid `docker compose build --no-cache` unless you need a clean build.
#   • Optional registry cache (CI): buildx bake / --cache-to type=registry,...
#
# PostgreSQL: not defined here. Point DATABASE_URL at your existing Postgres:
#   • Same user-defined network as another stack: postgresql://USER:PASS@postgres:5432/DB
#   • Postgres only on the host: postgresql://USER:PASS@host.docker.internal:5432/DB
#     (Linux: ensure extra_hosts below is enabled)
#   • Or the Docker bridge gateway (often 172.17.0.1): postgresql://USER:PASS@172.17.0.1:5432/DB
#
# Copy .env (or export vars) with at least DATABASE_URL and JWT_SECRET_KEY (see app/config.py).
#
# Join an existing network (where Postgres already runs):
#   networks:
#     default:
#       name: your_external_network
#       external: true
#   Then remove the internal `nafetha` network block and attach both services to `default`.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nafetha-api
    restart: unless-stopped
    env_file:
      - .env
    # Persist LinkedIn session.json and scraper output; requires this repo path on the host
    volumes:
      - ./nafetha-scrapers:/app/nafetha-scrapers
      - ./data:/app/data
    networks:
      - nafetha
      - postgres_net
    # Linux: reach Postgres on the VPS host from the container
    extra_hosts:
      - "host.docker.internal:host-gateway"

  admin-ui:
    build:
      context: .
      dockerfile: Dockerfile.admin-ui
      args:
        API_BASE_URL: ${API_BASE_URL:-}
    container_name: nafetha-admin-ui
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - nafetha

  nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80" # Public HTTP (Cloudflare talks to this)
      - "443:443" # Public HTTPS
      - "81:81" # The NPM Admin Dashboard
    volumes:
      - ./npm-data:/data
      - ./npm-letsencrypt:/etc/letsencrypt
    networks:
      - nafetha

networks:
  nafetha:
    driver: bridge
  postgres_net:        # Define the external network here
    name: postgres_default
    external: true
